# ============================================
# seshat - Docker Compose
# ============================================
# Services:
#   api  - REST API (port 3333)
#   mcp  - MCP stdio client (connects to api)
#
# Usage:
#   docker compose up -d api        # API only
#   docker compose up -d            # API + MCP
#   docker compose logs -f          # Watch logs
#
# MCP via Docker (Claude Desktop / OpenCode):
#   docker compose run --rm -i mcp
# ============================================

services:
  api:
    build:
      context: .
      target: api
    container_name: seshat-api
    restart: unless-stopped
    ports:
      - "${SESHAT_API_PORT:-3333}:3333"
    volumes:
      - seshat-data:/data
    environment:
      - NODE_ENV=production
      - SESHAT_API_PORT=3333
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_EMBEDDING_MODEL=${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text:latest}
      - OLLAMA_EMBEDDING_DIMENSIONS=${OLLAMA_EMBEDDING_DIMENSIONS:-768}
      - RLM_LLM_ENABLED=${RLM_LLM_ENABLED:-false}
      - RLM_LLM_API_KEY=${RLM_LLM_API_KEY:-}
      - RLM_LLM_MODEL=${RLM_LLM_MODEL:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3333/health"]
      interval: 30s
      timeout: 3s
      start_period: 40s
      retries: 3

  mcp:
    build:
      context: .
      target: mcp
    container_name: seshat-mcp
    stdin_open: true
    environment:
      - NODE_ENV=production
      - SESHAT_API_URL=http://api:3333
    depends_on:
      api:
        condition: service_healthy

volumes:
  seshat-data:
    driver: local
